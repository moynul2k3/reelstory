name: Build, Docker & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKER_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN || secrets.DOCKER_PASSWORD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker Hub credentials
        run: |
          if [ -z "${DOCKERHUB_USERNAME}" ] || [ -z "${DOCKERHUB_TOKEN}" ]; then
            echo "Docker Hub credentials are missing. Set DOCKERHUB_USERNAME/DOCKERHUB_TOKEN (or DOCKER_USERNAME/DOCKER_PASSWORD)." >&2
            exit 1
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/rappio-backend:latest
            ${{ env.DOCKERHUB_USERNAME }}/rappio-backend:${{ github.sha }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Validate SSH network reachability
        run: |
          set -euo pipefail
          VPS_HOST="${{ secrets.VPS_HOST }}"
          VPS_PORT="${{ secrets.VPS_PORT || '22' }}"

          if [ -z "${VPS_HOST}" ] || [ -z "${VPS_PORT}" ]; then
            echo "Missing VPS_HOST or VPS_PORT secret." >&2
            exit 1
          fi

          if ! [[ "${VPS_PORT}" =~ ^[0-9]+$ ]]; then
            echo "VPS_PORT must be numeric. Current value: ${VPS_PORT}" >&2
            exit 1
          fi

          if ! nc -zvw8 "${VPS_HOST}" "${VPS_PORT}"; then
            echo "Cannot open TCP connection to ${VPS_HOST}:${VPS_PORT} from GitHub runner." >&2
            echo "Check VPS firewall/security-group/provider ACL/NAT to allow GitHub runner IPs." >&2
            exit 1
          fi

          if ! ssh-keyscan -T 8 -p "${VPS_PORT}" "${VPS_HOST}" >/dev/null 2>&1; then
            echo "TCP is open but SSH handshake failed for ${VPS_HOST}:${VPS_PORT}." >&2
            exit 1
          fi

      - name: Transfer project files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USERNAME}}
          password: ${{ secrets.VPS_PASSWORD }}
          timeout: 120s
          command_timeout: 10m
          debug: true
          source: "compose.yml,.env"
          target: /home/${{ secrets.VPS_USERNAME}}/rappio2

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USERNAME}}
          password: ${{ secrets.VPS_PASSWORD }}
          timeout: 120s
          command_timeout: 15m
          debug: true
          script: |
            set -e
            cd /home/${{ secrets.VPS_USERNAME}}/rappio2

            export IMAGE_NAMESPACE=${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKER_USERNAME || 'moynul2k3' }}
            export IMAGE_TAG=latest
            docker compose pull
            docker compose down --remove-orphans
            docker compose up -d 
            docker system prune -f
