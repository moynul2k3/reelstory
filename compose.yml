networks:
  rappio_net:
    driver: bridge

services:
  api:
    image: ${IMAGE_NAMESPACE:-moynul2k3}/rappio-backend:${IMAGE_TAG:-latest}
    container_name: rappio_api
    ports:
      - "9919:8000"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./media:/app/media
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8000/ > /dev/null || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5

    networks:
      - rappio_net
